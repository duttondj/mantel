services:
  app:
    build: .
    # bind to 0.0.0.0 so other machines on your LAN can reach it.
    # access from another PC at: http://<server-lan-ip>:13000
    ports:
      - '0.0.0.0:13000:3000'
    environment:
      DATABASE_URL: postgres://mantel:${DB_PASSWORD}@db:5432/mantel
      # app -> minio talks over the internal docker network, NOT the
      # published host port, so this stays on 9000.
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: photos
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # APP_URL must be reachable by the browser. For LAN access set this
      # in .env to http://<server-lan-ip>:13000
      APP_URL: ${APP_URL:-http://localhost:13000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:-Mantel <noreply@mantel.wedding>}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_LOCATION_ID: ${SQUARE_LOCATION_ID:-}
      SQUARE_WEBHOOK_SECRET: ${SQUARE_WEBHOOK_SECRET:-}
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-sandbox}
      SQUARE_PRICE_CENTS: ${SQUARE_PRICE_CENTS:-2000}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mantel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mantel
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mantel']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      # 19000 = S3 API, 19001 = web console. Both on the 10000+ range to
      # avoid colliding with other docker stacks on your home server.
      - '0.0.0.0:19000:9000'
      - '0.0.0.0:19001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # one-shot: creates the photos bucket on first boot, then exits.
  # MinIO does NOT auto-create buckets, so without this the first upload fails.
  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      mc mb --ignore-existing local/photos;
      exit 0;
      "

volumes:
  db_data:
  minio_data:
