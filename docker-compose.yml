services:
  app:
    build: .
    # Port 13000 for direct LAN access only — internet traffic goes via Caddy.
    ports:
      - '127.0.0.1:13000:3000'
    environment:
      DATABASE_URL: postgres://mantel:${DB_PASSWORD}@db:5432/mantel
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: photos
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:13000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:-Mantel <noreply@mantel.wedding>}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_LOCATION_ID: ${SQUARE_LOCATION_ID:-}
      SQUARE_WEBHOOK_SECRET: ${SQUARE_WEBHOOK_SECRET:-}
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-sandbox}
      SQUARE_PRICE_CENTS: ${SQUARE_PRICE_CENTS:-2000}
      AUTO_CLOSE_DAYS: ${AUTO_CLOSE_DAYS:-14}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
    restart: unless-stopped

  caddy:
    build: ./caddy
    ports:
      - '0.0.0.0:80:80'
      - '0.0.0.0:443:443'
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      CF_API_TOKEN: ${CF_API_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - app
    restart: unless-stopped

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    network_mode: host
    cap_drop:
      - all
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      CLOUDFLARE_API_TOKEN: ${CF_API_TOKEN}
      DOMAINS: ${APP_DOMAIN}
      PROXIED: "true"
      IP6_PROVIDER: "none"
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mantel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mantel
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mantel']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - '127.0.0.1:19000:9000'
      - '127.0.0.1:19001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # one-shot: creates the photos bucket on first boot, then exits.
  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      mc mb --ignore-existing local/photos;
      exit 0;
      "

volumes:
  db_data:
  minio_data:
  caddy_data:
